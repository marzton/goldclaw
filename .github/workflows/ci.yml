name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  goldshore:
    name: Goldshore Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/goldshore
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: workers/goldshore/package-lock.json

      - name: Install
        run: npm ci

      - name: Generate Wrangler types
        run: npm run types

      - name: Typecheck
        run: npm run check
